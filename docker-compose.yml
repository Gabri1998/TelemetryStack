version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: telemetry-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: telemetry
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin

  redis:
    image: redis:7
    container_name: telemetry-redis
    ports:
      - "6379:6379"

  mqtt:
    image: eclipse-mosquitto
    container_name: telemetry-mqtt
    ports:
      - "1883:1883"